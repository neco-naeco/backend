services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_SYNCHRONIZE: 'true'
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: 'no'

  python-runner:
    image: neconaeco/python-runner:python-3.12-v1
    build:
      context: ./docker/runtime/python-runner
    profiles:
      - runtime-images
    restart: 'no'

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-neconaeco}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: 'no'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --requirepass "$${REDIS_PASSWORD}" --save 60 1 --loglevel warning
        else
          exec redis-server --save 60 1 --loglevel warning
        fi
    tmpfs:
      - /data
    healthcheck:
      test:
        - 'CMD-SHELL'
        - |
          if [ -n "${REDIS_PASSWORD:-}" ]; then
            redis-cli -a "${REDIS_PASSWORD}" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5
    restart: 'no'
